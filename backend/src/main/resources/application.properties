spring.application.name=SIRA-Backend

# Base de datos
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sira}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:sira-dev-secret-key-must-be-at-least-32-chars}
jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}